<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>C1 Highway Runner - Humo Ajustado</title>
  <style>
    * { -webkit-tap-highlight-color: transparent; touch-action: none; }
    body {
      margin: 0; overflow: hidden; background: #000;
      display: flex; justify-content: center; align-items: center; height: 100vh;
      font-family: 'Courier New', monospace; user-select: none; -webkit-user-select: none;
    }
    canvas {
      box-shadow: 0 0 40px rgba(0,255,255,0.3);
      image-rendering: auto;
      image-rendering: -webkit-optimize-contrast;
      display: block;
      max-width: 100%;
      max-height: 100%;
    }
    .screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.92); display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(8px);
    }
    .screen.hidden { display: none; }
    h1 {
      color: #fff; font-size: 36px; margin-bottom: 30px;
      text-shadow: 0 0 20px #0ff; text-transform: uppercase; text-align: center; padding: 0 20px;
    }
    .car-grid { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 90%; padding: 0 10px; }
    .car-btn {
      background: #1a1a1a; border: 2px solid #333; border-radius: 12px;
      padding: 20px; cursor: pointer; transition: all 0.2s; text-align: center; width: 140px;
    }
    .car-btn:active { transform: scale(0.95); }
    .car-btn:hover { border-color: #0ff; background: #222; box-shadow: 0 0 30px rgba(0, 255, 255, 0.4); }
    .car-btn img { width: 100%; height: 80px; object-fit: contain; margin-bottom: 10px; }
    .car-btn span { color: #fff; font-size: 13px; font-weight: bold; display: block; text-transform: uppercase; }

    #radio-screen h2 { color: #ffaa00; font-size: 32px; margin: 20px 0 10px; text-shadow: 0 0 15px #f80; }
    #radio-screen p { color: #aaa; font-size: 18px; margin-bottom: 40px; text-align: center; max-width: 400px; line-height: 1.5; }
    #radio-img { width: 400px; max-width: 80%; margin-bottom: 30px; filter: drop-shadow(0 0 20px rgba(255, 170, 0, 0.5)); }
    
    .play-btn {
      background: linear-gradient(145deg, #00ccff, #0088cc); color: #000; border: none;
      padding: 20px 50px; font-size: 24px; font-weight: bold; cursor: pointer;
      border-radius: 50px; text-transform: uppercase; letter-spacing: 3px;
      box-shadow: 0 0 30px rgba(0, 204, 255, 0.6); transition: all 0.3s;
    }
    .play-btn:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(0, 204, 255, 0.9); }

    #ui { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 20px; text-shadow: 2px 2px #000; pointer-events: none; z-index: 10; }
    #speed { color: #0ff; font-weight: bold; font-size: 32px; }
    
    #mobile-controls {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.7); font-size: 16px; text-align: center;
      pointer-events: none; z-index: 10; background: rgba(0,0,0,0.6); padding: 15px 30px; border-radius: 30px;
    }
    #brake-indicator {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #ff0000; font-size: 64px; font-weight: bold; opacity: 0;
      pointer-events: none; z-index: 20; text-shadow: 0 0 30px #f00; transition: opacity 0.1s;
    }
    #brake-indicator.active { opacity: 0.8; }

    .audio-controls {
      position: absolute; top: 20px; right: 20px; z-index: 50; display: flex; gap: 10px;
    }
    .audio-btn {
      background: rgba(0,0,0,0.6); color: #fff; border: 1px solid #0ff;
      padding: 8px 12px; cursor: pointer; border-radius: 5px; font-family: inherit; font-size: 14px;
    }
    .audio-btn:hover { background: rgba(0,255,255,0.2); }
    .audio-btn.muted { opacity: 0.5; border-color: #666; }
  </style>
</head>
<body>

  <audio id="bgMusic" loop preload="auto">
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <div id="menu" class="screen">
    <h1>Elige tu Piloto</h1>
    <div class="car-grid" id="car-options"></div>
  </div>

  <div id="radio-screen" class="screen hidden">
    <h2>¡Coche Listo!</h2>
    <img id="radio-img" src="radio.png" alt="Sintonizando radio">
    <p>Sintoniza tu frecuencia favorita antes de salir a la carretera.</p>
    <button class="play-btn" id="playBtn">▶ PLAY</button>
  </div>

  <canvas id="game" width="1920" height="960"></canvas>
  
  <div id="ui" class="hidden">
    <div>VELOCIDAD: <span id="speed">0</span> km/h</div>
    <div>DISTANCIA: <span id="dist">0</span> m</div>
  </div>

  <div class="audio-controls hidden" id="audioControls">
    <button class="audio-btn" id="musicBtn">🎵 Música</button>
    <button class="audio-btn" id="sfxBtn">🔊 SFX</button>
  </div>
  
  <div id="mobile-controls" class="hidden">👆 Toca para cambiar carril | Mantén para frenar</div>
  <div id="brake-indicator">🛑 FRENANDO</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 1920, H = 960;

// 🔊 SISTEMA DE AUDIO (SIN MOTOR)
const AudioSys = {
  ctx: null, musicEnabled: true, sfxEnabled: true, lastLaneChange: 0,
  init() { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
  
  playLaneChange() {
    if (!this.ctx || !this.sfxEnabled) return; 
    const now = Date.now(); if (now - this.lastLaneChange < 200) return; this.lastLaneChange = now;
    const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.type = 'sine';
    osc.frequency.setValueAtTime(400, this.ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(800, this.ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.1, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
    osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.1);
  },
  
  playCrash() {
    if (!this.ctx || !this.sfxEnabled) return;
    const bufferSize = this.ctx.sampleRate * 0.5; const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = this.ctx.createBufferSource(); noise.buffer = buffer;
    const gain = this.ctx.createGain(); gain.gain.setValueAtTime(0.3, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
    noise.connect(gain); gain.connect(this.ctx.destination); noise.start();
  },
  
  playJump() {
    if (!this.ctx || !this.sfxEnabled) return;
    const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.type = 'triangle';
    osc.frequency.setValueAtTime(150, this.ctx.currentTime); osc.frequency.linearRampToValueAtTime(300, this.ctx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.15, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.25);
    osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.25);
  },
  
  toggleMusic() {
    this.musicEnabled = !this.musicEnabled;
    document.getElementById('bgMusic').muted = !this.musicEnabled;
    return this.musicEnabled;
  },
  toggleSFX() { this.sfxEnabled = !this.sfxEnabled; return this.sfxEnabled; }
};

// 🎨 SISTEMA DE PARTÍCULAS
let particles = [];
const PARTICLE_MAX = 150;

function spawnSmoke(x, y) {
  if (particles.length > PARTICLE_MAX) particles.splice(0, 20);
  particles.push({
    x: x, y: y,
    vx: -3 - Math.random() * 2,
    vy: -1 + Math.random() * 2,
    life: 0.8 + Math.random() * 0.4,
    maxLife: 1.2,
    size: 8 + Math.random() * 12,
    type: 'smoke'
  });
}

function spawnSparks(x, y) {
  for (let i = 0; i < 25; i++) {
    let angle = Math.random() * Math.PI * 2;
    let speed = 4 + Math.random() * 8;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0.3 + Math.random() * 0.3,
      maxLife: 0.6,
      size: 2 + Math.random() * 3,
      type: 'spark',
      hue: 30 + Math.random() * 30
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.025;
    if (p.type === 'smoke') {
      p.size += 0.6; p.vy -= 0.04; p.vx *= 0.98;
    } else if (p.type === 'spark') {
      p.vy += 0.25; p.vx *= 0.96;
    }
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (let p of particles) {
    let alpha = Math.max(0, p.life / p.maxLife);
    if (p.type === 'smoke') {
      ctx.fillStyle = `rgba(180, 180, 180, ${alpha * 0.6})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.type === 'spark') {
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = `hsla(${p.hue}, 100%, 60%, ${alpha})`;
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
      ctx.globalCompositeOperation = 'source-over';
    }
  }
}

function resizeCanvas() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width = (W * scale) + 'px'; canvas.style.height = (H * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas); resizeCanvas();

const bgMusic = document.getElementById('bgMusic'); bgMusic.volume = 0.35;

const ALL_CARS = [
  { name: 'Perickko', file: 'perickko.png' }, { name: 'Pepino', file: 'pepino.png' },
  { name: 'Carlitos', file: 'carlitos.png' }, { name: 'Nandors', file: 'nandors.png' },
  { name: 'Manoli', file: 'manoli.png' }, { name: 'Masme', file: 'masme.png' }, { name: 'Valefor', file: 'valefor.png' }
];

const images = {}; ALL_CARS.forEach(c => { const img = new Image(); img.src = c.file; images[c.file] = img; });

const ROAD_Y = H - 288, LANE_HEIGHT = 115, LANE_TOP = ROAD_Y - LANE_HEIGHT, LANE_BOTTOM = ROAD_Y;

// 🚗 ESTADO DEL JUGADOR
let player = {
  lane: 0, y: LANE_TOP, targetY: LANE_TOP, x: 288, speed: 0, maxSpeed: 6, w: 384, h: 254,
  isJumping: false, jumpY: 0, jumpVel: 0, jumpAngle: 0
};

let obstacles = [], buildings = [], roadOffset = 0, gameActive = false, score = 0;

function initMenu() {
  const grid = document.getElementById('car-options');
  ALL_CARS.forEach(car => {
    const btn = document.createElement('div'); btn.className = 'car-btn';
    btn.innerHTML = `<img src="${car.file}"><span>${car.name}</span>`;
    const select = () => { selectedCar = car; document.getElementById('menu').classList.add('hidden'); document.getElementById('radio-screen').classList.remove('hidden'); };
    btn.addEventListener('click', select); btn.addEventListener('touchstart', (e) => { e.preventDefault(); select(); });
    grid.appendChild(btn);
  });
}

document.getElementById('playBtn').addEventListener('click', startGame);
document.getElementById('playBtn').addEventListener('touchstart', (e) => { e.preventDefault(); startGame(); });

function startGame() {
  AudioSys.init();
  bgMusic.play().catch(e => console.log("Audio:", e));
  document.getElementById('radio-screen').classList.add('hidden');
  document.getElementById('ui').classList.remove('hidden');
  document.getElementById('mobile-controls').classList.remove('hidden');
  document.getElementById('audioControls').classList.remove('hidden');
  gameActive = true;
}

document.getElementById('musicBtn').addEventListener('click', () => { const e = AudioSys.toggleMusic(); document.getElementById('musicBtn').classList.toggle('muted', !e); });
document.getElementById('sfxBtn').addEventListener('click', () => { const e = AudioSys.toggleSFX(); document.getElementById('sfxBtn').classList.toggle('muted', !e); });

function generateBuildings() {
  buildings = []; let x = 0;
  while (x < W + 400) {
    let width = 115 + Math.random() * 192, height = 154 + Math.random() * 288;
    buildings.push({ x, y: ROAD_Y - height, w: width, h: height, windows: Math.random() > 0.5, color: `hsl(${200 + Math.random() * 40}, ${20 + Math.random() * 20}%, ${20 + Math.random() * 15}%)` });
    x += width - 19;
  }
}

function spawnObstacle() {
  let lane = Math.floor(Math.random() * 2);
  let laneY = lane === 0 ? LANE_TOP : LANE_BOTTOM;
  let rand = Math.random();
  let obs;
  
  if (rand < 0.12) {
    obs = { x: W + 200, y: laneY, lane, isRamp: true, w: 220, h: 60 };
  } else {
    let available = ALL_CARS.filter(c => c.file !== selectedCar.file);
    let type = available[Math.floor(Math.random() * available.length)];
    obs = { x: W + 200, y: laneY, lane, type, isRamp: false, w: 346, h: 230 };
  }
  obstacles.push(obs);
}

function drawRamp(obs) {
  ctx.save();
  ctx.translate(obs.x, obs.y + 40);
  ctx.fillStyle = '#ffaa00'; ctx.strokeStyle = '#fff'; ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(-obs.w/2, obs.h/2);
  ctx.lineTo(obs.w/2, obs.h/2);
  ctx.lineTo(obs.w/2, -obs.h/2);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.fillRect(-30, 10, 20, 25); ctx.fillRect(20, -10, 20, 35);
  ctx.restore();
}

let touchStartTime = 0, isBraking = false, touchTimer = null;
function handleTouchStart(e) { e.preventDefault(); if (!gameActive) return; touchStartTime = Date.now(); isBraking = false; touchTimer = setTimeout(() => { isBraking = true; document.getElementById('brake-indicator').classList.add('active'); }, 200); }
function handleTouchEnd(e) { e.preventDefault(); if (!gameActive) return; clearTimeout(touchTimer); if (Date.now() - touchStartTime < 200 && !isBraking) { 
  player.lane = player.lane === 0 ? 1 : 0; player.targetY = player.lane === 0 ? LANE_TOP : LANE_BOTTOM; AudioSys.playLaneChange();
} isBraking = false; document.getElementById('brake-indicator').classList.remove('active'); }
canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

window.addEventListener('keydown', e => {
  if (e.code === 'ArrowUp' || e.code === 'Space') { player.lane = player.lane === 0 ? 1 : 0; player.targetY = player.lane === 0 ? LANE_TOP : LANE_BOTTOM; AudioSys.playLaneChange(); }
  if (e.code === 'ArrowDown') { isBraking = true; document.getElementById('brake-indicator').classList.add('active'); }
});
window.addEventListener('keyup', e => { if (e.code === 'ArrowDown') { isBraking = false; document.getElementById('brake-indicator').classList.remove('active'); } });

function drawCity() {
  let grad = ctx.createLinearGradient(0, 0, 0, ROAD_Y);
  grad.addColorStop(0, '#0a0a2e'); grad.addColorStop(0.5, '#1a1a3e'); grad.addColorStop(1, '#2a2a4e');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, ROAD_Y);
  buildings.forEach(b => {
    ctx.fillStyle = b.color; ctx.fillRect(b.x, b.y, b.w, b.h);
    if (b.windows) { ctx.fillStyle = 'rgba(255,255,150,0.3)'; for (let wy = b.y+19; wy<b.y+b.h-19; wy+=48) for (let wx = b.x+19; wx<b.x+b.w-19; wx+=38) if (Math.random()>0.3) ctx.fillRect(wx,wy,23,29); }
    ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 4; ctx.strokeRect(b.x,b.y,b.w,b.h);
  });
}

function drawRoad() {
  ctx.fillStyle = '#333'; ctx.fillRect(0, ROAD_Y-LANE_HEIGHT, W, LANE_HEIGHT*2);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 8; ctx.setLineDash([58, 58]); ctx.lineDashOffset = -roadOffset;
  ctx.beginPath(); ctx.moveTo(0,ROAD_Y); ctx.lineTo(W,ROAD_Y); ctx.stroke(); ctx.setLineDash([]);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 8; ctx.beginPath(); ctx.moveTo(0,ROAD_Y-LANE_HEIGHT); ctx.lineTo(W,ROAD_Y-LANE_HEIGHT); ctx.moveTo(0,ROAD_Y+LANE_HEIGHT); ctx.lineTo(W,ROAD_Y+LANE_HEIGHT); ctx.stroke();
  let bp = Math.floor(roadOffset/77)%2===0?'#f00':'#fff'; ctx.fillStyle=bp; ctx.fillRect(0,ROAD_Y-LANE_HEIGHT-19,W,19); ctx.fillRect(0,ROAD_Y+LANE_HEIGHT,W,19);
}

function drawPlayerSprite() {
  ctx.save();
  let drawY = player.y - player.jumpY;
  ctx.translate(player.x, drawY);
  ctx.rotate(player.jumpAngle);
  if (selectedCar && images[selectedCar.file]?.complete) {
    ctx.drawImage(images[selectedCar.file], -player.w/2, -player.h/2, player.w, player.h);
  } else {
    ctx.fillStyle = '#111'; ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
  }
  ctx.restore();
}

function drawObstacleSprite(obs) {
  ctx.save(); ctx.translate(obs.x, obs.y);
  if (!obs.isRamp && images[obs.type.file]?.complete) {
    ctx.drawImage(images[obs.type.file], -obs.w/2, -obs.h/2, obs.w, obs.h);
  } else if (!obs.isRamp) {
    ctx.fillStyle = '#f00'; ctx.fillRect(-obs.w/2, -obs.h/2, obs.w, obs.h);
  }
  ctx.restore();
}

function update() {
  if (!gameActive) return;
  
  player.speed = isBraking ? Math.max(0, player.speed - 0.1) : Math.min(player.speed + 0.01, player.maxSpeed);
  player.y += (player.targetY - player.y) * 0.15;
  roadOffset += player.speed * 4;
  
  buildings.forEach(b => { b.x -= player.speed * 1.5; if (b.x+b.w<0) { b.x=W+Math.random()*192; b.h=154+Math.random()*288; b.y=ROAD_Y-b.h; } });
  
  // 🌫️ Generar humo al acelerar/moverse (POSICIÓN SUBIDA 45px)
  if (player.speed > 1) {
    let exhaustX = player.x - player.w/2 + 30;
    let exhaustY = player.y - player.jumpY + player.h/2 - 60; // ⬅️ Antes era -15, ahora -60
    let smokeCount = Math.floor(player.speed * 0.4);
    for(let i=0; i<smokeCount; i++) spawnSmoke(exhaustX, exhaustY);
  }
  
  if (Math.random() < 0.01 + (player.speed/500)) {
    let l=obstacles[obstacles.length-1]; if (!l || l.x<W-480) spawnObstacle();
  }
  
  for (let i=obstacles.length-1; i>=0; i--) {
    let o=obstacles[i]; o.x-=player.speed*4;
    
    if (o.isRamp && !player.isJumping && player.lane === o.lane) {
      if (Math.abs(player.x - o.x) < 140) {
        player.isJumping = true;
        player.jumpVel = 16;
        player.jumpAngle = -0.6;
        AudioSys.playJump();
        obstacles.splice(i, 1);
        continue;
      }
    }
    
    if (!o.isRamp && player.lane===o.lane && Math.abs(player.x-o.x)<269) { 
      player.speed*=0.3; 
      obstacles.splice(i,1); 
      AudioSys.playCrash();
      spawnSparks(player.x + player.w/2 - 20, player.y - player.jumpY);
      ctx.fillStyle='rgba(255,0,0,0.5)'; ctx.fillRect(0,0,W,H); 
    }
    
    if (o.x<-384) { obstacles.splice(i,1); score+=10; }
  }
  
  if (player.isJumping) {
    player.jumpY += player.jumpVel;
    player.jumpVel -= 0.65;
    player.jumpAngle = Math.max(-0.8, Math.min(0.4, -player.jumpVel * 0.035));
    if (player.jumpY <= 0) {
      player.jumpY = 0; player.jumpVel = 0; player.jumpAngle = 0; player.isJumping = false;
    }
  }
  
  updateParticles();
  
  score += Math.floor(player.speed);
  document.getElementById('speed').innerText = Math.floor(player.speed*15);
  document.getElementById('dist').innerText = Math.floor(score/10);
}

function loop() {
  ctx.clearRect(0,0,W,H); 
  drawCity(); 
  drawRoad();
  
  let list=[]; obstacles.forEach(o=>list.push({t:'obs',o,y:o.y})); 
  if(gameActive) list.push({t:'p',o:player,y:player.y - player.jumpY});
  list.sort((a,b)=>a.y-b.y); 
  list.forEach(i=>i.t==='p'?drawPlayerSprite(): (i.o.isRamp ? drawRamp(i.o) : drawObstacleSprite(i.o)));
  
  drawParticles();
  update(); 
  requestAnimationFrame(loop);
}

initMenu(); generateBuildings(); requestAnimationFrame(loop);
</script>
</body>
</html>
