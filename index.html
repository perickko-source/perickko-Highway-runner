<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>C1 Highway Runner - Edición Definitiva</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      user-select: none;
    }
    canvas {
      box-shadow: 0 0 40px rgba(0,255,255,0.3);
      image-rendering: pixelated;
      display: block;
    }
    
    /* ESTILOS DEL MENÚ DE SELECCIÓN */
    #menu {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      backdrop-filter: blur(5px);
    }
    #menu h1 {
      color: #fff;
      font-size: 40px;
      margin-bottom: 40px;
      text-shadow: 0 0 15px #0ff;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .car-grid {
      display: flex;
      gap: 25px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 1000px;
    }
    .car-btn {
      background: #1a1a1a;
      border: 2px solid #333;
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      width: 140px;
    }
    .car-btn:hover {
      border-color: #0ff;
      transform: translateY(-5px);
      background: #222;
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
    }
    .car-btn img {
      width: 100%;
      height: 80px;
      object-fit: contain;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 5px rgba(255,255,255,0.3));
    }
    .car-btn span {
      color: #fff;
      font-size: 14px;
      font-weight: bold;
      display: block;
      text-transform: uppercase;
    }

    /* UI DEL JUEGO */
    #ui {
      position: absolute;
      top: 20px; left: 20px;
      color: #fff;
      font-size: 20px;
      text-shadow: 2px 2px #000;
      pointer-events: none;
      z-index: 10;
    }
    #speed { color: #0ff; font-weight: bold; font-size: 28px; }
    #hint {
      position: absolute;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>

  <!-- MENÚ DE SELECCIÓN -->
  <div id="menu">
    <h1>Elige tu Piloto</h1>
    <div class="car-grid" id="car-options">
      <!-- Se generan con JS -->
    </div>
  </div>

  <canvas id="game" width="1000" height="500"></canvas>
  
  <div id="ui">
    <div>VELOCIDAD: <span id="speed">0</span> km/h</div>
    <div>DISTANCIA: <span id="dist">0</span> m</div>
  </div>
  <div id="hint">↑ o ESPACIO - Cambiar Carril | ↓ - Frenar</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 1000, H = 500;

// 🚗 LISTA DE TODOS LOS COCHES (Incluyendo a Valefor)
const ALL_CARS = [
  { name: 'Perickko', file: 'perickko.png' },
  { name: 'Pepino', file: 'pepino.png' },
  { name: 'Carlitos', file: 'carlitos.png' },
  { name: 'Nandors', file: 'nandors.png' },
  { name: 'Manoli', file: 'manoli.png' },
  { name: 'Masme', file: 'masme.png' },
  { name: 'Valefor', file: 'valefor.png' } // 🆕 Nuevo añadido
];

// Cargar todas las imágenes en memoria
const images = {};
ALL_CARS.forEach(c => {
  const img = new Image();
  img.src = c.file;
  images[c.file] = img;
});

// 🎮 Configuración del juego
const ROAD_Y = H - 150;
const LANE_HEIGHT = 60;
const LANE_TOP = ROAD_Y - LANE_HEIGHT;
const LANE_BOTTOM = ROAD_Y;

// Estado del juego
let selectedCar = null; 
let player = {
  lane: 0, 
  y: LANE_TOP,
  targetY: LANE_TOP,
  x: 150, 
  speed: 0,
  maxSpeed: 6,
  w: 200, // Tamaño jugador
  h: 133
};

let obstacles = [];
let buildings = [];
let roadOffset = 0;
let gameActive = false; 
let score = 0;
let keys = {};

// 🏗️ Crear botones del menú
function initMenu() {
  const grid = document.getElementById('car-options');
  ALL_CARS.forEach(car => {
    const btn = document.createElement('div');
    btn.className = 'car-btn';
    btn.innerHTML = `
      <img src="${car.file}" alt="${car.name}">
      <span>${car.name}</span>
    `;
    btn.onclick = () => selectCar(car);
    grid.appendChild(btn);
  });
}

// 🕹️ Lógica de Selección
function selectCar(car) {
  selectedCar = car;
  document.getElementById('menu').style.display = 'none';
  gameActive = true;
}

// 🏙️ Generar ciudad
function generateBuildings() {
  buildings = [];
  let x = 0;
  while (x < W + 200) {
    let width = 60 + Math.random() * 100;
    let height = 80 + Math.random() * 150;
    buildings.push({
      x: x, y: ROAD_Y - height, w: width, h: height,
      windows: Math.random() > 0.5,
      color: `hsl(${200 + Math.random() * 40}, ${20 + Math.random() * 20}%, ${20 + Math.random() * 15}%)`
    });
    x += width - 10;
  }
}

// 🚧 Generar obstáculos (Excluyendo al jugador)
function spawnObstacle() {
  let lane = Math.floor(Math.random() * 2);
  let laneY = lane === 0 ? LANE_TOP : LANE_BOTTOM;
  
  // Filtramos para que no salga el mismo coche que el jugador
  let availableObstacles = ALL_CARS.filter(c => c.file !== selectedCar.file);
  let randomCar = availableObstacles[Math.floor(Math.random() * availableObstacles.length)];
  
  obstacles.push({
    x: W + 100,
    y: laneY,
    lane: lane,
    type: randomCar,
    w: 180, 
    h: 120  
  });
}

// 🕹️ Controles
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (gameActive) {
    if (e.code === 'ArrowUp' || e.code === 'Space') {
      player.lane = player.lane === 0 ? 1 : 0;
      player.targetY = player.lane === 0 ? LANE_TOP : LANE_BOTTOM;
    }
    if (e.code === 'ArrowDown') {
      player.speed = Math.max(0, player.speed - 0.2);
    }
  }
});
window.addEventListener('keyup', e => keys[e.code] = false);

// 🎨 Dibujar ciudad
function drawCity() {
  let grad = ctx.createLinearGradient(0, 0, 0, ROAD_Y);
  grad.addColorStop(0, '#0a0a2e'); grad.addColorStop(0.5, '#1a1a3e'); grad.addColorStop(1, '#2a2a4e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, ROAD_Y);
  
  buildings.forEach(b => {
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    if (b.windows) {
      ctx.fillStyle = 'rgba(255, 255, 150, 0.3)';
      for (let wy = b.y + 10; wy < b.y + b.h - 10; wy += 25) {
        for (let wx = b.x + 10; wx < b.x + b.w - 10; wx += 20) {
          if (Math.random() > 0.3) ctx.fillRect(wx, wy, 12, 15);
        }
      }
    }
    ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 2;
    ctx.strokeRect(b.x, b.y, b.w, b.h);
  });
}

// 🛣️ Dibujar carretera
function drawRoad() {
  ctx.fillStyle = '#333';
  ctx.fillRect(0, ROAD_Y - LANE_HEIGHT, W, LANE_HEIGHT * 2);
  
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
  ctx.setLineDash([30, 30]); ctx.lineDashOffset = -roadOffset;
  ctx.beginPath(); ctx.moveTo(0, ROAD_Y); ctx.lineTo(W, ROAD_Y); ctx.stroke();
  ctx.setLineDash([]);
  
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(0, ROAD_Y - LANE_HEIGHT); ctx.lineTo(W, ROAD_Y - LANE_HEIGHT);
  ctx.moveTo(0, ROAD_Y + LANE_HEIGHT); ctx.lineTo(W, ROAD_Y + LANE_HEIGHT);
  ctx.stroke();
  
  let borderPattern = Math.floor(roadOffset / 40) % 2 === 0 ? '#f00' : '#fff';
  ctx.fillStyle = borderPattern;
  ctx.fillRect(0, ROAD_Y - LANE_HEIGHT - 10, W, 10);
  ctx.fillRect(0, ROAD_Y + LANE_HEIGHT, W, 10);
}

// 🚗 Dibujar Jugador
function drawPlayerSprite() {
  ctx.save();
  ctx.translate(player.x, player.y);
  if (selectedCar && images[selectedCar.file] && images[selectedCar.file].complete) {
    ctx.drawImage(images[selectedCar.file], -player.w/2, -player.h/2, player.w, player.h); 
  } else {
    ctx.fillStyle = '#111'; ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
  }
  ctx.restore();
}

// 🚧 Dibujar Obstáculo
function drawObstacleSprite(obs) {
  ctx.save();
  ctx.translate(obs.x, obs.y);
  if (images[obs.type.file] && images[obs.type.file].complete) {
    ctx.drawImage(images[obs.type.file], -obs.w/2, -obs.h/2, obs.w, obs.h);
  } else {
    ctx.fillStyle = '#f00'; ctx.fillRect(-obs.w/2, -obs.h/2, obs.w, obs.h);
  }
  ctx.restore();
}

// 🔄 Actualizar Lógica
function update() {
  if (!gameActive) return;
  
  player.speed = Math.min(player.speed + 0.01, player.maxSpeed);
  player.y += (player.targetY - player.y) * 0.15;
  roadOffset += player.speed * 4;
  
  buildings.forEach(b => {
    b.x -= player.speed * 1.5; 
    if (b.x + b.w < 0) {
      b.x = W + Math.random() * 100;
      b.h = 80 + Math.random() * 150;
      b.y = ROAD_Y - b.h;
    }
  });
  
  if (Math.random() < 0.01 + (player.speed / 500)) {
    let lastObs = obstacles[obstacles.length - 1];
    if (!lastObs || lastObs.x < W - 250) spawnObstacle();
  }
  
  for (let i = obstacles.length - 1; i >= 0; i--) {
    let obs = obstacles[i];
    obs.x -= player.speed * 4;

    let isSameLane = (player.lane === obs.lane);
    let isClose = Math.abs(player.x - obs.x) < 140; 

    if (isSameLane && isClose) {
      player.speed *= 0.3; 
      obstacles.splice(i, 1); 
      ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
      ctx.fillRect(0, 0, W, H);
    }
    
    if (obs.x < -200) {
      obstacles.splice(i, 1);
      score += 10;
    }
  }
  
  score += Math.floor(player.speed);
  document.getElementById('speed').innerText = Math.floor(player.speed * 15);
  document.getElementById('dist').innerText = Math.floor(score / 10);
}

// 🎬 Bucle Principal
function loop() {
  ctx.clearRect(0, 0, W, H);
  drawCity();
  drawRoad();

  let renderList = [];
  obstacles.forEach(obs => renderList.push({ type: 'obs', obj: obs, y: obs.y }));
  if (gameActive) renderList.push({ type: 'player', obj: player, y: player.y });

  renderList.sort((a, b) => a.y - b.y);

  renderList.forEach(item => {
    if (item.type === 'player') drawPlayerSprite();
    else drawObstacleSprite(item.obj);
  });

  update();
  requestAnimationFrame(loop);
}

// Iniciar todo
initMenu();
generateBuildings();
requestAnimationFrame(loop);
</script>
</body>
</html>
